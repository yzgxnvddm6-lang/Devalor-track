<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Devalor Track</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Mono','Courier New',monospace;background:#06060f;min-height:100vh;color:#e8e4d9;overflow-x:hidden}
input[type=number],input[type=text],input[type=date]{-moz-appearance:textfield;-webkit-appearance:none;font-family:inherit}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
select,button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:radial-gradient(ellipse at center, #0d0d1f 0%, #06060f 70%)}
.login-box{width:100%;max-width:340px}
.login-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:900;text-align:center;letter-spacing:-1px;margin-bottom:4px}
.login-logo span{color:#b4f040}
.login-tagline{font-size:9px;color:#222;letter-spacing:4px;text-transform:uppercase;text-align:center;margin-bottom:40px}
.pin-display{display:flex;justify-content:center;gap:16px;margin-bottom:32px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid #1a1a2a;transition:all .25s cubic-bezier(.4,0,.2,1)}
.pin-dot.filled{background:#b4f040;border-color:#b4f040;box-shadow:0 0 12px rgba(180,240,64,0.4)}
.pin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.pin-btn{padding:20px;background:#0d0d1f;border:1px solid #141428;color:#e8e4d9;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;border-radius:4px;transition:all .15s;position:relative;overflow:hidden}
.pin-btn::after{content:'';position:absolute;inset:0;background:rgba(180,240,64,0);transition:background .15s}
.pin-btn:active::after{background:rgba(180,240,64,0.1)}
.pin-btn:active{transform:scale(0.94);border-color:#b4f040}
.pin-btn.del{font-size:16px;color:#333}
.login-error{color:#da6b6b;font-size:11px;text-align:center;margin-top:16px;min-height:18px;letter-spacing:1px}

/* ── LAYOUT ── */
.header{border-bottom:1px solid #0f0f1e;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;background:rgba(6,6,15,0.95);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:900;letter-spacing:-0.5px}
.logo span{color:#b4f040}
.logo-sub{font-size:8px;color:#111;letter-spacing:4px;text-transform:uppercase;margin-top:2px}
.nav{display:flex;flex-wrap:wrap;gap:2px}
.tab{padding:7px 11px;border:1px solid #0f0f1e;background:transparent;color:#333;font-size:9px;letter-spacing:2px;text-transform:uppercase;transition:all .2s;border-radius:2px}
.tab:hover{color:#666;border-color:#1a1a2a}
.tab.active{background:#b4f040;color:#06060f;border-color:#b4f040;font-weight:700}
.logout-btn{width:32px;height:32px;border:1px solid #111;background:transparent;color:#333;font-size:14px;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.logout-btn:hover{border-color:#da6b6b;color:#da6b6b}
.controls{padding:12px 18px 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.month-sel{background:#0d0d1f;border:1px solid #141428;color:#e8e4d9;font-family:inherit;font-size:11px;padding:7px 12px;border-radius:2px;outline:none;transition:border .2s}
.month-sel:focus{border-color:#b4f040}
.content{max-width:960px;margin:0 auto;padding:14px 16px;padding-bottom:40px}

/* ── CARDS ── */
.card{background:#0d0d1f;border:1px solid #111827;border-radius:4px;padding:16px;margin-bottom:10px;transition:border .2s}
.card-glow{background:linear-gradient(135deg,#0f1a08 0%,#0d0d1f 100%);border-color:#1a2a1a}
.card-blue{background:linear-gradient(135deg,#080f1a 0%,#0d0d1f 100%);border-color:#1a1a3a}
.card-purple{background:linear-gradient(135deg,#0f0818 0%,#0d0d1f 100%);border-color:#2a1a3a}

/* ── INPUTS ── */
.lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#333;margin-bottom:6px;display:block}
.inp{width:100%;background:#06060f;border:1px solid #111827;color:#e8e4d9;font-family:inherit;font-size:20px;padding:12px 8px;text-align:center;border-radius:3px;outline:none;transition:all .2s}
.inp:focus{border-color:#b4f040;box-shadow:0 0 0 3px rgba(180,240,64,0.06)}
.inp.ac{border-color:#b4f040}
.inp-date{width:100%;background:#06060f;border:1px solid #111827;color:#e8e4d9;font-family:inherit;font-size:14px;padding:10px 10px;border-radius:3px;outline:none;transition:all .2s}
.inp-date:focus{border-color:#b4f040}

/* ── BUTTONS ── */
.btn-save{width:100%;padding:14px;background:#b4f040;color:#06060f;border:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:900;letter-spacing:4px;text-transform:uppercase;border-radius:3px;margin-top:12px;transition:all .2s;position:relative;overflow:hidden}
.btn-save:active{transform:scale(0.98)}
.btn-save.saved{background:#0a1f0a;color:#4bda4b;border:1px solid #1a3a1a}
.btn-sm{padding:6px 12px;border:1px solid #111827;background:transparent;color:#333;font-size:9px;letter-spacing:2px;text-transform:uppercase;border-radius:2px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:#b4f040;color:#b4f040}
.btn-del{padding:3px 8px;border:1px solid #1a0a0a;background:transparent;color:#444;font-size:10px;border-radius:2px;cursor:pointer;transition:all .2s}
.btn-del:hover{border-color:#da6b6b;color:#da6b6b}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:12px}
.stat-val{font-family:'Syne',sans-serif;font-weight:900;font-size:22px;line-height:1}
.stat-lbl{font-size:8px;color:#333;margin-top:5px;letter-spacing:3px;text-transform:uppercase}
.stat-sub{font-size:11px;margin-top:4px}

/* ── COLORS ── */
.up{color:#6bda6b}.dn{color:#da6b6b}.mu{color:#333}.ac{color:#b4f040}.bl{color:#4ab0f0}

/* ── ROW ITEMS ── */
.ri{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #0f0f1e}
.ri:last-child{border-bottom:none}
.rl{font-size:11px;color:#444}
.rl-sub{font-size:9px;color:#222;margin-top:2px}
.rv{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}

/* ── DAY ROWS ── */
.dr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.dd{width:52px;font-size:10px;color:#333}
.dbw{flex:1;height:3px;background:#0f0f1e;border-radius:2px;overflow:hidden}
.db{height:100%;background:#b4f040;border-radius:2px;transition:width .5s}
.dv{width:76px;text-align:right;font-size:11px;font-family:'Syne',sans-serif;font-weight:700}
.dp{width:38px;text-align:right;font-size:10px;color:#444}

/* ── KPI BOX ── */
.kpi{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.kb{background:#06060f;border:1px solid #0f0f1e;border-radius:3px;padding:12px}
.kv{font-family:'Syne',sans-serif;font-weight:800;font-size:18px}
.kl{font-size:8px;color:#333;letter-spacing:3px;text-transform:uppercase;margin-top:4px}

/* ── FILTERS ── */
.fb{padding:6px 14px;border:1px solid #0f0f1e;background:transparent;color:#333;font-size:9px;letter-spacing:2px;text-transform:uppercase;border-radius:2px;transition:all .2s}
.fb.on{background:#0f1a08;color:#b4f040;border-color:#b4f040}
.sel{width:100%;background:#06060f;border:1px solid #111827;color:#e8e4d9;font-family:inherit;font-size:14px;padding:10px 8px;border-radius:3px;outline:none;transition:border .2s}
.sel:focus{border-color:#b4f040}

/* ── TOTAL CARDS ── */
.tb{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.tc{background:#0d0d1f;border:1px solid #0f0f1e;border-radius:3px;padding:14px}

/* ── BAR CHART ── */
.bw{display:flex;align-items:flex-end;gap:3px;height:60px;margin-top:12px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bf{width:100%;border-radius:2px 2px 0 0;transition:height .3s}
.bd{font-size:7px;color:#1a1a2a}

/* ── ROLE BADGES ── */
.rb{display:inline-block;padding:2px 7px;border-radius:2px;font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-left:6px;vertical-align:middle}
.rb-operator{background:#0f1a08;color:#b4f040;border:1px solid #1a2a14}
.rb-assistant{background:#080f1a;color:#4ab0f0;border:1px solid #14201a}
.rb-trainee{background:#1a0f08;color:#f0a04a;border:1px solid #2a1a14}
.rb-owner{background:#180a18;color:#d040f0;border:1px solid #280a28}

/* ── CALC BOX ── */
.calc-box{background:#06060f;border:1px solid #0f0f1e;border-radius:3px;padding:16px;margin-bottom:12px;text-align:center;transition:all .3s}

/* ── NOTIFICATION ── */
.ts{background:#060f06;border:1px solid #0f1f0f;border-radius:3px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:#333}

/* ── NOTE ── */
.note{padding:8px 12px;background:#06060f;border:1px solid #0f0f1e;border-radius:2px;font-size:10px;color:#333;margin-top:8px;line-height:1.6}

/* ── SECTION TITLE ── */
.st{font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #0f0f1e}

/* ── RANK BAR ── */
.rank-bar{height:5px;background:#0f0f1e;border-radius:3px;overflow:hidden;margin-top:5px}
.rank-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── VALUATION ── */
.val-box{border-radius:4px;padding:16px;text-align:center;border:1px solid}
.val-number{font-family:'Syne',sans-serif;font-weight:900;line-height:1;letter-spacing:-1px}
.val-locked{filter:blur(4px);user-select:none}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .tb{grid-template-columns:1fr}
  .kpi{grid-template-columns:1fr 1fr}
  .g4{grid-template-columns:1fr 1fr}
}

    });

const bW = (a,id) => a.filter(e => e.workerId===id);
const bM = (a,ym) => a.filter(e => e.date && e.date.startsWith(ym));
const mBonus = (ke,tiers) => { let r=0; tiers.forEach(t => { if(ke>=t.min) r=t.rate; }); return ke*r; };
const rb = (role) => '<span class="rb rb-'+role+'">'+(ROLE_LABELS[role]||role)+'</span>';

// ─── P&L CALCULATOR ──────────────────────────────────────────────────────────
function calcPL(me, month) {
  const f = FD[month] || {};
  const kk=sum(bW(me,"kimmo"),"ke"), sk=sum(bW(me,"shohid"),"ke");
  const hk=sum(bW(me,"hannan"),"ke"), rk=sum(bW(me,"rizwan"),"ke");
  const ak=sum(bW(me,"aki"),"ke"),    jk=sum(bW(me,"julius"),"ke");

  const pd = f.paige  || bW(me,"paige").length;
  const rd = f.rizwan || bW(me,"rizwan").length;
  const md = f.mira   || bW(me,"mira").length;

  const ukComm = (kk+sk+hk+rk)*0.10;
  const fiComm = (ak+jk)*0.10;

  // Income
  const pR=pd*150, rR=rd*150, mR=md*150;

  // Costs
  const sd=bW(me,"shohid").length, hd=bW(me,"hannan").length;
  const sB=sd*140, sBo=mBonus(sk,[{min:100000,rate:0.02}]);
  const hB=hd*100, hBo=mBonus(hk,[{min:100000,rate:0.02},{min:150000,rate:0.035}]);
  const pC=pd*80, rC=rd*100, mC=md*130;
  const aC=ak*0.075, jC=jk*0.05;

  const uI=ukComm+pR+rR+mR, uCo=sB+sBo+hB+hBo+pC+rC+mC;
  const fI=fiComm, fCo=aC+jC;

  return {
    uk: {income:uI, cost:uCo, net:uI-uCo, kK:kk, sK:sk, hK:hk, rK:rk,
         pR, rR, mR, sB, sBo, hB, hBo, pC, rC, mC, sd, hd, pd, rd, md},
    fi: {income:fI, cost:fCo, net:fI-fCo, aK:ak, jK:jk, aC, jC},
    tot: {income:uI+fI, cost:uCo+fCo, net:(uI-uCo)+(fI-fCo)}
  };
}

function pp(v) {
  if(v==='⌫') { pin=pin.slice(0,-1); }
  else if(pin.length<6) { pin+=v; }
  const matched = USERS.find(x => x.pin===pin);
  if(matched) {
    user=matched; pin=""; view="entry"; fDate=td(); render();
  } else if(pin.length>=6 || (pin.length===4 && !USERS.some(x=>x.pin.startsWith(pin)&&x.pin.length>4))) {
    renderLogin();
    document.getElementById('pe').textContent = "Incorrect PIN";
    setTimeout(() => { pin=""; renderLogin(); }, 900);
  } else {
    renderLogin();
  }
}

// ─── SAVE ─────────────────────────────────────────────────────────────────────
async function save() {
  const w = WORKERS.find(x => x.id===user.workerId);
  const entryDate = fDate || td();
  let ke=0, mgn=0, purchases=0, sales=0;
  const a=parseInt(fA)||0, k=parseInt(fK)||0;

  if(w.role==='operator'||w.role==='owner') {
    purchases=parseInt(fP)||0; sales=parseInt(fS)||0;
    if(!purchases&&!sales) return;
    ke=Math.max(0,sales-purchases);
    mgn=sales>0?Math.round((ke/sales)*100):0;
  } else {
    ke=(w.billedRate||0)-(w.dailyRate||0);
    sales=w.billedRate||0;
    mgn=sales>0?Math.round((ke/sales)*100):0;
  }

  const id = entryDate+user.workerId;
  const entry = {id, date:entryDate, workerId:user.workerId, ke, purchases, sales, mgn, a, k};
  entries = entries.filter(e=>e.id!==id);
  entries.push(entry);

  await supa.upsert("entries", {id, date:entryDate, workerId:user.workerId, ke, purchases, sales, mgn, a, k});

  fP=""; fS=""; fA=""; fK=""; fDate=td(); showBackdate=false;
  saved=true; render();
  clearTimeout(saveT);
  saveT=setTimeout(() => { saved=false; render(); }, 2500);
}

async function delEntry(id) {
  entries=entries.filter(e=>e.id!==id);
  await supa.del("entries", id);
  render();
}

// ─── LIVE CALC ────────────────────────────────────────────────────────────────
function updateCalc() {
  const p=parseInt(fP)||0, s=parseInt(fS)||0;
  const a=parseInt(fA)||0, k=parseInt(fK)||0;
  const ke=s>p?s-p:0;
  const mgn=s>0?Math.round((ke/s)*100):0;
  const close=a>0?Math.round((k/a)*100):0;

  const box=document.getElementById('calc-box');
  if(box) {
    if(s>0&&p>0) {
      const col=mgn>=35?'#6bda6b':mgn>=22?'#b4f040':'#da6b6b';
      const brd=mgn>=35?'#1a3a1a':mgn>=22?'#2a2a0a':'#2a1a1a';
      box.style.borderColor=brd;
      box.innerHTML=
        '<div class="val-number" style="font-size:40px;color:'+col+'">'+mgn+'%</div>'+
        '<div style="font-size:9px;color:#333;letter-spacing:3px;margin-top:6px">MARGIN</div>'+
        '<div style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:#b4f040;margin-top:8px">'+ke.toLocaleString('en-GB')+' profit</div>';
    } else {
      box.style.borderColor='#0f0f1e';
      box.innerHTML='<div style="font-size:11px;color:#222">Enter purchases & sales</div>';
    }
  }
  const cr=document.getElementById('close-rate');
  if(cr) {
    if(a>0&&k>0&&k<=a) {
      cr.innerHTML='<span style="font-size:13px;color:#6bda6b;font-family:Syne,sans-serif;font-weight:800">'+close+'% close rate</span> <span style="font-size:10px;color:#333">'+k+'/'+a+' deals</span>';
    } else if(k>a&&a>0) {
      cr.innerHTML='<span style="color:#da6b6b;font-size:11px">⚠ Closed cannot exceed customers</span>';
    } else {
      cr.innerHTML='';
    }
  }
}

      html += '<div class="ri"><div class="rl">Paige ('+P.uk.pd+'d × £150)</div><div class="rv">£'+fmt(P.uk.pR)+'</div></div>';
      html += '<div class="ri"><div class="rl">Rizwan ('+P.uk.rd+'d × £150)</div><div class="rv">£'+fmt(P.uk.rR)+'</div></div>';

      html += '<div style="display:flex;justify-content:space-between;padding:8px 0"><span style="font-size:11px;font-weight:700">Total</span><span style="font-family:Syne,sans-serif;font-weight:900;font-size:14px;color:#b4f040">£'+fmt(P.uk.income)+'</span></div>';
      html += '</div>';

      html += '<div><div class="st" style="color:#da6b6b">COSTS</div>';
      html += '<div class="ri"><div class="rl">Shohid ('+P.uk.sd+'d×£140)</div><div class="rv dn">-£'+fmt(P.uk.sB)+'</div></div>';
      if(P.uk.sBo>0) html += '<div class="ri"><div class="rl">Shohid bonus</div><div class="rv dn">-£'+fmt(P.uk.sBo)+'</div></div>';
      html += '<div class="ri"><div class="rl">Hannan ('+P.uk.hd+'d×£100)</div><div class="rv dn">-£'+fmt(P.uk.hB)+'</div></div>';
      if(P.uk.hBo>0) html += '<div class="ri"><div class="rl">Hannan bonus</div><div class="rv dn">-£'+fmt(P.uk.hBo)+'</div></div>';
      html += '<div class="ri"><div class="rl">Paige ('+P.uk.pd+'d×£80)</div><div class="rv dn">-£'+fmt(P.uk.pC)+'</div></div>';
      html += '<div class="ri"><div class="rl">Rizwan ('+P.uk.rd+'d×£100)</div><div class="rv dn">-£'+fmt(P.uk.rC)+'</div></div>';
      html += '<div class="ri"><div class="rl">Mira ('+P.uk.md+'d×£130)</div><div class="rv dn">-£'+fmt(P.uk.mC)+'</div></div>';
      html += '<div style="display:flex;justify-content:space-between;padding:8px 0"><span style="font-size:11px;font-weight:700">Total</span><span style="font-family:Syne,sans-serif;font-weight:900;font-size:14px;color:#da6b6b">-£'+fmt(P.uk.cost)+'</span></div>';
      html += '</div></div></div>';
    }

    // Finland P&L
    if(cFilter==='all'||cFilter==='fi') {
      html += '<div class="card" style="border-color:#1a0a0a">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
      html += '<div style="font-family:Syne,sans-serif;font-size:14px;font-weight:800">🇫🇮 Finland</div>';
      html += '<div style="font-family:Syne,sans-serif;font-size:18px;font-weight:900;color:'+(P.fi.net>=0?'#6bda6b':'#da6b6b')+'">€'+fmt(P.fi.net)+'</div></div>';
      html += '<div class="g2">';
      html += '<div><div class="st" style="color:#b4f040">INCOME</div>';
      html += '<div class="ri"><div><div class="rl">Aki × 10%</div><div class="rl-sub">€'+fmt(P.fi.aK)+'</div></div><div class="rv">€'+fmt(P.fi.aK*0.10)+'</div></div>';
      html += '<div class="ri"><div><div class="rl">Julius × 10%</div><div class="rl-sub">€'+fmt(P.fi.jK)+'</div></div><div class="rv">€'+fmt(P.fi.jK*0.10)+'</div></div>';
      html += '<div style="display:flex;justify-content:space-between;padding:8px 0"><span style="font-size:11px;font-weight:700">Total</span><span style="font-family:Syne,sans-serif;font-weight:900;font-size:14px;color:#b4f040">€'+fmt(P.fi.income)+'</span></div>';
      html += '</div>';
      html += '<div><div class="st" style="color:#da6b6b">COSTS</div>';
      html += '<div class="ri"><div class="rl">Aki (7.5%)</div><div class="rv dn">-€'+fmt(P.fi.aC)+'</div></div>';
      html += '<div class="ri"><div class="rl">Julius (5.0%)</div><div class="rv dn">-€'+fmt(P.fi.jC)+'</div></div>';
      html += '<div style="display:flex;justify-content:space-between;padding:8px 0"><span style="font-size:11px;font-weight:700">Total</span><span style="font-family:Syne,sans-serif;font-weight:900;font-size:14px;color:#da6b6b">-€'+fmt(P.fi.cost)+'</span></div>';
      html += '</div></div></div>';
    }

    // Trend chart
    html += '<div class="card"><span class="lbl">Daily Margin — Last 14 Active Days</span>';
    html += '<div class="bw">'+tbar+'</div></div>';
  }

  // ── MANAGE ──
  if(view==='manage' && isOwner) {
    html += '<div class="card card-blue">';
    html += '<span class="lbl">➕ Add New Operator</span>';
    html += '<div style="font-size:10px;color:#222;margin-bottom:14px">Add operator, assistant, or trainee to the platform</div>';

    html += '<div class="g2" style="margin-bottom:10px">';
    html += '<div><span class="lbl">Full Name</span><input type="text" class="inp" style="font-size:14px" id="m-name" placeholder="Name" oninput="mState.name=this.value"></div>';
    html += '<div><span class="lbl">Company (optional)</span><input type="text" class="inp" style="font-size:14px" id="m-company" placeholder="Company Ltd" oninput="mState.company=this.value"></div>';
    html += '</div>';

    html += '<div class="g2" style="margin-bottom:10px">';
    html += '<div><span class="lbl">Role</span><select class="sel" onchange="mState.role=this.value;render()">';
    ['operator','assistant','trainee'].forEach(r => {
      html += '<option value="'+r+'"'+(mState.role===r?' selected':'')+'>'+r.charAt(0).toUpperCase()+r.slice(1)+'</option>';
    });
    html += '</select></div>';
    html += '<div><span class="lbl">Country</span><select class="sel" onchange="mState.country=this.value">';
    html += '<option value="uk"'+(mState.country==='uk'?' selected':'')+'>🇬🇧 United Kingdom</option>';
    html += '<option value="fi"'+(mState.country==='fi'?' selected':'')+'>🇫🇮 Finland</option>';
    html += '</select></div>';
    html += '</div>';

    html += '<div class="g2" style="margin-bottom:10px">';
    html += '<div><span class="lbl">Vehicle / Car reg</span><input type="text" class="inp" style="font-size:14px" id="m-car" placeholder="AB12CDE" oninput="mState.car=this.value"></div>';
    html += '<div><span class="lbl">PIN Code</span><input type="text" class="inp" style="font-size:14px" id="m-pin" placeholder="4-digit PIN" maxlength="4" oninput="mState.pin=this.value"></div>';
    html += '</div>';

    if(mState.role==='operator') {
      html += '<div class="g2" style="margin-bottom:10px">';
      html += '<div><span class="lbl">Daily Rate (£/€)</span><input type="number" class="inp" style="font-size:16px" placeholder="0" oninput="mState.dailyRate=parseInt(this.value)||0"></div>';
      html += '<div><span class="lbl">Commission % (FI subcontractors)</span><input type="number" class="inp" style="font-size:16px" placeholder="0" oninput="mState.commRate=parseFloat(this.value)||0"></div>';
      html += '</div>';
    }
    if(mState.role==='assistant'||mState.role==='trainee') {
      html += '<div class="g2" style="margin-bottom:10px">';
      html += '<div><span class="lbl">Billed to client (£/€/day)</span><input type="number" class="inp" style="font-size:16px" placeholder="150" oninput="mState.billedRate=parseInt(this.value)||0"></div>';
      html += '<div><span class="lbl">Paid to worker (£/€/day)</span><input type="number" class="inp" style="font-size:16px" placeholder="80" oninput="mState.dailyRate=parseInt(this.value)||0"></div>';
      html += '</div>';
    }

    html += '<div style="margin-bottom:10px">';
    html += '<div style="display:flex;align-items:center;gap:10px;padding:10px;background:#06060f;border:1px solid #0f0f1e;border-radius:3px">';
    html += '<input type="checkbox" id="m-ea" onchange="mState.earlyAdopter=this.checked" style="width:16px;height:16px">';
    html += '<label for="m-ea" style="font-size:12px;cursor:pointer">⭐ Early Adopter — €50/month locked, 5% exit fee, 500 founding points</label>';
    html += '</div></div>';

    html += '<div id="m-status" style="min-height:20px;margin-bottom:8px;font-size:11px;text-align:center"></div>';
    html += '<button class="btn-save" onclick="addMember()">ADD TO PLATFORM</button>';
    html += '</div>';

    // Current members list
    html += '<div class="card" style="margin-top:10px">';
    html += '<span class="lbl">Current Platform Members</span>';
    WORKERS.forEach(wk => {
      html += '<div class="ri">';
      html += '<div><div style="font-family:Syne,sans-serif;font-size:13px;font-weight:700">'+wk.name+' '+rb(wk.role)+'</div>';
      html += '<div style="font-size:10px;color:#333;margin-top:2px">'+wk.country.toUpperCase()+' · '+wk.car+(wk.earlyAdopter?' · ⭐ EA':'')+'</div></div>';
      html += '<div style="text-align:right">';
      if(wk.role==='assistant'||wk.role==='trainee') {
        html += '<div style="font-size:11px;color:#b4f040">£'+wk.billedRate+'/day billed</div>';
        html += '<div style="font-size:10px;color:#444">£'+wk.dailyRate+'/day paid</div>';
      } else if(wk.dailyRate>0) {
        html += '<div style="font-size:11px;color:#b4f040">£'+wk.dailyRate+'/day</div>';
      } else if(wk.rate>0) {
        html += '<div style="font-size:11px;color:#b4f040">'+(wk.rate*100)+'% commission</div>';
      }
      html += '</div></div>';
    });
    html += '</div>';
  }

  html += '</div>';
  document.getElementById('root').innerHTML = html;
}

// ─── MANAGE STATE ─────────────────────────────────────────────────────────────
let mState = {name:'',company:'',role:'operator',country:'uk',car:'',pin:'',
               dailyRate:0,billedRate:0,commRate:0,earlyAdopter:false};

async function addMember() {
  const status = document.getElementById('m-status');
  if(!mState.name) { status.innerHTML='<span style="color:#da6b6b">Name is required</span>'; return; }
  if(!mState.pin||mState.pin.length<4) { status.innerHTML='<span style="color:#da6b6b">PIN must be 4 digits</span>'; return; }
  if(USERS.find(u=>u.pin===mState.pin)) { status.innerHTML='<span style="color:#da6b6b">PIN already in use</span>'; return; }

  status.innerHTML='<span style="color:#b4f040">Saving...</span>';

  const id = mState.name.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,12)+Date.now().toString().slice(-4);

  const opData = {
    id, name:mState.name, company:mState.company||null,
    country:mState.country, car:mState.car||null, role:mState.role,
    billed_rate:mState.billedRate||0, daily_rate:mState.dailyRate||0,
    commission_rate:mState.commRate||0, bonus_tiers:[],
    note:mState.role==='assistant'?'Assistant — £'+mState.billedRate+' billed / £'+mState.dailyRate+' paid':
         mState.role==='trainee'?'Trainee — 10-day programme':
         'Operator — £'+mState.dailyRate+'/day',
    active:true, early_adopter:mState.earlyAdopter,
    joined_date:new Date().toISOString().slice(0,10)
  };

  const userdata = {
    id: id+'-user', operator_id:id, pin:mState.pin, role:'worker'
  };

  const ok1 = await supa.upsert("operators", opData);
  const ok2 = await supa.upsert("users", userdata);

  if(ok1 && ok2) {
    // Add to local state
    WORKERS.push({
      id, name:mState.name, country:mState.country, car:mState.car||'',
      role:mState.role, billedRate:mState.billedRate||0, dailyRate:mState.dailyRate||0,
      rate:mState.commRate||0, bonusTiers:[], note:opData.note,
      earlyAdopter:mState.earlyAdopter
    });
    USERS.push({pin:mState.pin, workerId:id, role:'worker'});

    // Reset state
    mState = {name:'',company:'',role:'operator',country:'uk',car:'',pin:'',
              dailyRate:0,billedRate:0,commRate:0,earlyAdopter:false};
    status.innerHTML='<span style="color:#6bda6b">✓ Member added successfully!</span>';
    setTimeout(()=>render(), 1500);
  } else {
    status.innerHTML='<span style="color:#da6b6b">Error saving — check Supabase connection</span>';
  }
}
