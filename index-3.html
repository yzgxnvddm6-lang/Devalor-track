<title>Devalor Track</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Mono','Courier New',monospace;background:#080810;min-height:100vh;color:#e8e4d9}

  .login-logo{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;text-align:center;margin-bottom:6px}
  .login-logo span{color:#b4f040}
  .login-sub{font-size:10px;color:#333;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:36px}
  .pin-display{display:flex;justify-content:center;gap:14px;margin-bottom:28px}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #2a2a3a;transition:all .2s}
  .pin-dot.filled{background:#b4f040;border-color:#b4f040}
  .pin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .pin-btn{padding:18px;background:#10101c;border:1px solid #1c1c2c;color:#e8e4d9;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;border-radius:3px;transition:all .15s}
  .pin-btn:active{transform:scale(0.93);background:#b4f040;color:#080810}
  .pin-btn.del{font-size:14px;color:#555}
  .login-error{color:#da6b6b;font-size:12px;text-align:center;margin-top:14px;min-height:18px}
  .header{border-bottom:1px solid #1c1c2c;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;background:#080810;z-index:100}
  .logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800}
  .logo span{color:#b4f040}
  .logo-sub{font-size:9px;color:#1a1a1a;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
  .nav{display:flex}
  .tab{padding:7px 12px;border:1px solid #1c1c2c;background:transparent;color:#444;font-size:10px;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
  .tab.active{background:#b4f040;color:#080810;border-color:#b4f040}
  .logout-btn{padding:6px 10px;border:1px solid #222;background:transparent;color:#444;font-size:11px;cursor:pointer;border-radius:2px}
  .logout-btn:hover{border-color:#da6b6b;color:#da6b6b}
  .controls{padding:10px 16px 0;display:flex;gap:8px}
  .month-sel{background:#10101c;border:1px solid #1c1c2c;color:#e8e4d9;font-family:inherit;font-size:11px;padding:6px 10px;border-radius:2px;outline:none}
  .content{max-width:960px;margin:0 auto;padding:12px 14px}
  .card{background:#10101c;border:1px solid #1c1c2c;border-radius:3px;padding:14px;margin-bottom:10px}
  .lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#444;margin-bottom:5px;display:block}
  .big{font-family:'Syne',sans-serif;font-weight:800;line-height:1}
  .inp{width:100%;background:#080810;border:1px solid #1c1c2c;color:#e8e4d9;font-family:inherit;font-size:20px;padding:11px 6px;text-align:center;border-radius:2px;outline:none}

  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:10px}
  .sv{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;line-height:1}
  .sl{font-size:9px;color:#444;margin-top:4px;letter-spacing:2px;text-transform:uppercase}
  .ss{font-size:11px;margin-top:3px}
  .up{color:#6bda6b}.dn{color:#da6b6b}.mu{color:#444}.ac{color:#b4f040}
  .ri{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1c1c2c}
  .rl{font-size:11px;color:#444}
  .rv{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}
  .dr{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .dd{width:50px;font-size:10px;color:#444}
  .dbw{flex:1;height:3px;background:#1c1c2c;border-radius:2px;overflow:hidden}
  .db{height:100%;background:#b4f040;border-radius:2px}

  .tc{background:#10101c;border:1px solid #1c1c2c;border-radius:3px;padding:12px}

  const pR=pd*150,rR=rd*150;
  const sd=bW(me,"shohid").length,hd=bW(me,"hannan").length;

      box.style.borderColor=brd;
      box.innerHTML=`
        <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:${col}">${mgn}%</div>
        <div style="font-size:10px;color:#444;letter-spacing:2px;margin-top:2px">MARGIN</div>
        <div style="font-size:13px;color:#b4f040;margin-top:6px;font-family:'Syne',sans-serif;font-weight:700">${ke.toLocaleString("en-GB")} margin</div>`;
    } else {
      box.style.borderColor="#1c1c2c";
      box.innerHTML=`<div style="font-size:11px;color:#333">Enter purchases & sales to calculate margin</div>`;
    }
  }

  // Update close rate
  const cr=document.getElementById("close-rate");
  if(cr){
    if(a>0&&k>0&&k<=a){
      cr.innerHTML=`<span style="font-size:13px;color:#6bda6b;font-family:'Syne',sans-serif;font-weight:700">${close}% close rate</span> <span style="font-size:11px;color:#444">${k}/${a} deals</span>`;
    } else if(k>a&&a>0){
      cr.innerHTML=`<span style="color:#da6b6b;font-size:11px">⚠ Closed cannot exceed customers</span>`;
    } else {
      cr.innerHTML="";
    }
  }
}

function renderLogin(){
  const dots=[0,1,2,3].map(i=>`<div class="pin-dot${i<pin.length?" filled":""}"></div>`).join("");
  const btns=[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(n=>{
    if(n==="")return`<div></div>`;
    return`<button class="pin-btn${n==="⌫"?" del":""}" onclick="pp('${n}')">${n}</button>`;
  }).join("");
  document.getElementById("root").innerHTML=`
  <div class="login-wrap"><div class="login-box">
    <div class="login-logo">DEVALOR<span>.</span>TRACK</div>
    <div class="login-sub">Enter PIN code</div>
    <div class="pin-display">${dots}</div>
    <div class="pin-grid">${btns}</div>
    <div class="login-error" id="pe"></div>
  </div></div>`;
}

function pp(v){
  if(v==="⌫"){pin=pin.slice(0,-1);}
  else if(pin.length<4){pin+=v;}
  if(pin.length===4){
    const u=USERS.find(x=>x.pin===pin);
    if(u){user=u;pin="";view="entry";render();}
    else{
      renderLogin();
      document.getElementById("pe").textContent="Incorrect PIN";
      setTimeout(()=>{pin="";renderLogin();},900);
      return;
    }
  } else renderLogin();
}

function logout(){user=null;pin="";renderLogin();}
function setView(v){view=v;render();}
function setMonth(m){selMonth=m;render();}
function setFilter(f){cFilter=f;render();}

function save(){
  const a=parseInt(fA)||0,k=parseInt(fK)||0;
  const purchases=parseInt(fP)||0,sales=parseInt(fS)||0;
  if(!purchases||!sales)return;
  if(a>0&&k>a)return;
  const ke=Math.max(0,sales-purchases);
  const mgn=sales>0?Math.round((ke/sales)*100):0;
  const id=td()+user.workerId;
  entries=entries.filter(e=>e.id!==id);
  entries.push({id,date:td(),workerId:user.workerId,a,k,ke,purchases,sales,mgn});
  fA="";fK="";fKe="";fP="";fS="";
  saved=true;render();
  clearTimeout(saveT);
  saveT=setTimeout(()=>{saved=false;render();},2500);
}

function render(){
  if(!user){renderLogin();return;}
  const w=WORKERS.find(x=>x.id===user.workerId);
  const isOwner=user.role==="owner";
  const me=bM(entries,selMonth);
  const myE=bW(me,user.workerId);
  const myKe=sum(myE,"ke"),myA=sum(myE,"a"),myK=sum(myE,"k");
  const myS=sum(myE,"sales"),myDays=myE.length,myKpd=myDays>0?myKe/myDays:0;
  const myConv=myA>0?pct(myK,myA):0;
  const myMgn=myS>0?Math.round((myKe/myS)*100):myE.length>0?Math.round(myE.filter(e=>e.mgn>0).reduce((s,e,_,a)=>s+e.mgn/a.length,0)):0;
  const prev=selMonth==="2026-05"?bM(entries,"2026-04"):null;
  const prevKe=prev?sum(bW(prev,user.workerId),"ke"):null;
  const trend=prevKe>0?Math.round(((myKe-prevKe)/prevKe)*100):null;
  const todayE=entries.find(e=>e.date===td()&&e.workerId===user.workerId);
  const P=pl(me,selMonth);
  const allDates=[...new Set(entries.map(e=>e.date))].sort();
  const l14=allDates.slice(-14);
  const liveKePct=fP&&fS&&parseInt(fS)>0?Math.round(((parseInt(fS)-parseInt(fP))/parseInt(fS))*100):null;
  const liveConv=fA&&fK&&parseInt(fA)>0?pct(parseInt(fK),parseInt(fA)):null;

  const tabs=isOwner
    ?[["entry","Entry"],["worker","My Stats"],["owner","Owner"]]
    :[["entry","Entry"],["worker","My Stats"]];

  const nav=tabs.map(([v,l])=>`<button class="tab${view===v?" active":""}" onclick="setView('${v}')">${l}</button>`).join("");

  const hdr=`
  <div class="header">
    <div><div class="logo">DEVALOR<span>.</span>TRACK</div><div class="logo-sub">${w?.name}</div></div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="nav">${nav}</div>
      <button class="logout-btn" onclick="logout()">⏻</button>
    </div>
  </div>
  <div class="controls">
    <select class="month-sel" onchange="setMonth(this.value)">
      ${["2026-04","2026-05"].map(m=>`<option value="${m}"${m===selMonth?" selected":""}>${MO[m]}</option>`).join("")}
    </select>
  </div>`;

  let body="";

  if(view==="entry"){
    body=`<div style="max-width:440px;margin:0 auto">
    <div class="card">
      <span class="lbl">Operator</span>
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700">${w?.name}</div>
      <div class="note">${w?.note}</div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700">Daily Entry</div>
        <div style="font-size:10px;color:#444">${td()}</div>
      </div>
      ${todayE?`<div class="ts">
        <div style="margin-bottom:4px">Saved today — <span style="color:#888;font-size:10px">fill in to overwrite</span></div>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <span style="color:#b4f040;font-weight:700">${fc(todayE.ke,w?.country||"uk")} margin</span>
          <span style="color:#888">${todayE.mgn>0?todayE.mgn+"% margin":""}</span>
          <span style="color:#888">${todayE.a>0?todayE.a+"/"+todayE.k+" closed":""}</span>
        </div>
      </div>`:""}

      <div class="g2" style="margin-bottom:10px">
        <div>
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:5px;text-align:center">Purchases</div>
          <input type="number" class="inp" placeholder="0" value="${fP}" oninput="fP=this.value;updateCalc()" id="ip">
        </div>
        <div>
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:5px;text-align:center">Sales</div>
          <input type="number" class="inp" placeholder="0" value="${fS}" oninput="fS=this.value;updateCalc()" id="is">
        </div>
      </div>

      <div id="calc-box" style="background:#080810;border:1px solid #1c1c2c;border-radius:2px;padding:12px;margin-bottom:10px;text-align:center">
        <div style="font-size:11px;color:#333">Enter purchases & sales to calculate margin</div>
      </div>

      <div class="g2" style="margin-bottom:10px">
        <div>
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:5px;text-align:center">Customers</div>
          <input type="number" class="inp" placeholder="0" value="${fA}" oninput="fA=this.value;updateCalc()" id="ia">
        </div>
        <div>
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:5px;text-align:center">Closed</div>
          <input type="number" class="inp" placeholder="0" value="${fK}" oninput="fK=this.value;updateCalc()" id="ik">
        </div>
      </div>

      <div id="close-rate" style="text-align:center;margin-bottom:10px;min-height:20px"></div>
      <button class="btn-save${saved?" saved":""}" onclick="save()">${saved?"✓ SAVED":"SAVE DAY"}</button>
    </div></div>`;
  }

  if(view==="worker"){
    const maxKe=Math.max(...myE.map(e=>e.ke),1);
    const rows=[...myE].sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
      const showPct=e.mgn>0?e.mgn+"%":e.a>0?pct(e.k,e.a)+"%":"";
      return`<div class="dr">
        <div class="dd">${e.date.slice(5)}</div>
        <div class="dbw"><div class="db" style="width:${Math.round((e.ke/maxKe)*100)}%"></div></div>
        <div class="dv">${fc(e.ke,w?.country||"uk")}</div>
        <div class="dp">${showPct}</div>
      </div>`;
    }).join("");

    let bHtml="";
    if(w?.model==="sub"&&myKe>0){
      bHtml=`<div class="card"><span class="lbl">Commission Breakdown</span>
      <div class="g3" style="margin-top:8px">
        <div><div class="rl">Margin generated</div><div class="big ac" style="font-size:16px">${fc(myKe,w.country)}</div></div>
        <div><div class="rl">Your share (${w.rate*100}%)</div><div class="big up" style="font-size:16px">${fc(myKe*w.rate,w.country)}</div></div>
        <div><div class="rl">To Devalor</div><div class="big" style="font-size:16px;color:#dac86b">${fc(myKe*(0.10-w.rate),w.country)}</div></div>
      </div></div>`;
    }
    if((w?.model==="operator"||w?.model==="billable")&&myDays>0){
      const bo=w.bonusTiers?mBonus(myKe,w.bonusTiers):0;
      const nd=w.bonusTiers?Math.max(0,(w.bonusTiers[0]?.min||100000)-myKe):0;
      bHtml=`<div class="card"><span class="lbl">Pay Breakdown</span>
        <div class="ri"><div class="rl">Base pay (${myDays} days × £${w.dailyRate||w.dailyRateOut})</div><div class="rv">£${fmt(myDays*(w.dailyRate||w.dailyRateOut))}</div></div>
        ${bo>0?`<div class="ri"><div class="rl">Monthly bonus</div><div class="rv ac">£${fmt(bo)}</div></div>`:""}
        ${nd>0?`<div class="ri"><div class="rl">Still needed for bonus</div><div class="rv mu">£${fmt(nd)}</div></div>`:""}
      </div>`;
    }

    body=`
    <div class="card" style="background:linear-gradient(135deg,#0f1a08 0%,#10101c 100%);border-color:#1a2a1a">
      <span class="lbl">${MO[selMonth]}</span>
      <div class="sg">
        <div>
          <div class="sv ac">${fc(myKe,w?.country||"uk")}</div>
          <div class="sl">Total Margin</div>
          ${trend!==null?`<div class="ss ${trend>=0?"up":"dn"}">${trend>=0?"↑":"↓"} ${Math.abs(trend)}% vs prev.</div>`:""}
        </div>
        <div>
          <div class="sv ${myMgn>30?"up":myMgn>20?"ac":"mu"}">${myMgn>0?myMgn+"%":"—"}</div>
          <div class="sl">Margin %</div>
          <div class="ss mu">${myDays} days</div>
        </div>
        <div>
          <div class="sv">${myConv>0?myConv+"%":"—"}</div>
          <div class="sl">Close %</div>
          <div class="ss mu">${myK}/${myA}</div>
        </div>
      </div>
    </div>
    <div class="kpi">
      <div class="kb"><div class="kv">${fc(myKpd,w?.country||"uk")}</div><div class="kl">Margin / day</div></div>
      <div class="kb"><div class="kv">${myDays}</div><div class="kl">Days worked</div></div>
      <div class="kb"><div class="kv">${myConv>0?myConv+"%":"—"}</div><div class="kl">Close rate</div></div>
    </div>
    ${bHtml}
    <div class="card">
      <span class="lbl">Daily breakdown — ${MO[selMonth]}</span>
      <div style="margin-top:8px">${rows||'<div style="color:#444;font-size:12px">No entries yet</div>'}</div>
    </div>`;
  }

  if(view==="owner"&&isOwner){
    const tbar=l14.map((ds,i)=>{
      const dE=entries.filter(e=>e.date===ds&&(cFilter==="all"||WORKERS.find(w=>w.id===e.workerId)?.country===cFilter));
      const dKe=sum(dE,"ke");
      const mx=Math.max(1,...l14.map(d=>sum(entries.filter(e=>e.date===d&&(cFilter==="all"||WORKERS.find(w=>w.id===e.workerId)?.country===cFilter)),"ke")));
      const h=Math.max(3,Math.round((dKe/mx)*50));
      return`<div class="bc"><div class="bf" style="height:${h}px;background:${i===l14.length-1?"#b4f040":"#1e2e1e"}"></div><div class="bd">${ds.slice(5)}</div></div>`;
    }).join("");

    const ukH=(cFilter==="all"||cFilter==="uk")?`
    <div class="card" style="border-color:#1a1a3a">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700">🇬🇧 United Kingdom</div>
        <div class="big" style="font-size:17px;color:${P.uk.net>=0?"#6bda6b":"#da6b6b"}">£${fmt(P.uk.net)}</div>
      </div>
      <div class="g2">
        <div>
          <div class="st" style="color:#b4f040">INCOME</div>
          <div class="ri"><div><div class="rl">Kimmo × 10%</div><div style="font-size:9px;color:#333">£${fmt(P.uk.kK)}</div></div><div class="rv">£${fmt(P.uk.kK*0.10)}</div></div>
          <div class="ri"><div><div class="rl">Shohid × 10%</div><div style="font-size:9px;color:#333">£${fmt(P.uk.sK)}</div></div><div class="rv">£${fmt(P.uk.sK*0.10)}</div></div>
          <div class="ri"><div><div class="rl">Hannan × 10%</div><div style="font-size:9px;color:#333">£${fmt(P.uk.hK)}</div></div><div class="rv">£${fmt(P.uk.hK*0.10)}</div></div>
          <div class="ri"><div class="rl">Rizwan × 10%</div><div class="rv">£${fmt(P.uk.rK*0.10)}</div></div>
          <div class="ri"><div class="rl">Paige (${P.uk.pd}d × £150)</div><div class="rv">£${fmt(P.uk.pR)}</div></div>
          <div class="ri"><div class="rl">Rizwan (${P.uk.rd}d × £150)</div><div class="rv">£${fmt(P.uk.rR)}</div></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0">
            <span style="font-size:11px;font-weight:700">Total</span>
            <span class="big ac" style="font-size:13px">£${fmt(P.uk.income)}</span>
          </div>
        </div>
        <div>
          <div class="st" style="color:#da6b6b">COSTS</div>
          <div class="ri"><div class="rl">Shohid (${P.uk.sd}d×£140)</div><div class="rv dn">-£${fmt(P.uk.sB)}</div></div>
          ${P.uk.sBo>0?`<div class="ri"><div class="rl">Shohid bonus</div><div class="rv dn">-£${fmt(P.uk.sBo)}</div></div>`:""}
          <div class="ri"><div class="rl">Hannan (${P.uk.hd}d×£100)</div><div class="rv dn">-£${fmt(P.uk.hB)}</div></div>
          ${P.uk.hBo>0?`<div class="ri"><div class="rl">Hannan bonus</div><div class="rv dn">-£${fmt(P.uk.hBo)}</div></div>`:""}
          <div class="ri"><div class="rl">Paige (${P.uk.pd}d×£80)</div><div class="rv dn">-£${fmt(P.uk.pC)}</div></div>
          <div class="ri"><div class="rl">Rizwan (${P.uk.rd}d×£100)</div><div class="rv dn">-£${fmt(P.uk.rC)}</div></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0">
            <span style="font-size:11px;font-weight:700">Total</span>
            <span class="big dn" style="font-size:13px">-£${fmt(P.uk.cost)}</span>
          </div>
        </div>
      </div>
    </div>`:"";

    const fiH=(cFilter==="all"||cFilter==="fi")?`
    <div class="card" style="border-color:#2a1a1a">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700">🇫🇮 Finland</div>
        <div class="big" style="font-size:17px;color:${P.fi.net>=0?"#6bda6b":"#da6b6b"}">€${fmt(P.fi.net)}</div>
      </div>
      <div class="g2">
        <div>
          <div class="st" style="color:#b4f040">INCOME</div>
          <div class="ri"><div><div class="rl">Aki × 10%</div><div style="font-size:9px;color:#333">€${fmt(P.fi.aK)}</div></div><div class="rv">€${fmt(P.fi.aK*0.10)}</div></div>
          <div class="ri"><div><div class="rl">Julius × 10%</div><div style="font-size:9px;color:#333">€${fmt(P.fi.jK)}</div></div><div class="rv">€${fmt(P.fi.jK*0.10)}</div></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0">
            <span style="font-size:11px;font-weight:700">Total</span>
            <span class="big ac" style="font-size:13px">€${fmt(P.fi.income)}</span>
          </div>
        </div>
        <div>
          <div class="st" style="color:#da6b6b">COSTS</div>
          <div class="ri"><div class="rl">Aki (7.5%)</div><div class="rv dn">-€${fmt(P.fi.aC)}</div></div>
          <div class="ri"><div class="rl">Julius (5.0%)</div><div class="rv dn">-€${fmt(P.fi.jC)}</div></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0">
            <span style="font-size:11px;font-weight:700">Total</span>
            <span class="big dn" style="font-size:13px">-€${fmt(P.fi.cost)}</span>
          </div>
        </div>
      </div>
    </div>`:"";

    body=`
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="fb${cFilter==="all"?" on":""}" onclick="setFilter('all')">All</button>
      <button class="fb${cFilter==="uk"?" on":""}" onclick="setFilter('uk')">🇬🇧 UK</button>
      <button class="fb${cFilter==="fi"?" on":""}" onclick="setFilter('fi')">🇫🇮 Finland</button>
    </div>
    ${cFilter==="all"?`<div class="tb">
      <div class="tc"><span class="lbl">Income</span><div class="big ac" style="font-size:17px">£/€${fmt(P.tot.income)}</div></div>
      <div class="tc"><span class="lbl">Costs</span><div class="big dn" style="font-size:17px">-£/€${fmt(P.tot.cost)}</div></div>
      <div class="tc"><span class="lbl">Net to Kimmo</span><div class="big up" style="font-size:17px">£/€${fmt(P.tot.net)}</div></div>
    </div>`:""}
    ${ukH}${fiH}
    <div class="card">
      <span class="lbl">Daily margin — last 14 active days</span>
      <div class="bw">${tbar}</div>
    </div>`;
  }

  document.getElementById("root").innerHTML=`${hdr}<div class="content">${body}</div>`;
}

renderLogin();
</script>
