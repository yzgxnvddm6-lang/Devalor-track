<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Devalor Track</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@700;800;900&family=DM+Mono:wght@300;400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --lime:#b4f040; --dark:#06060f; --mid:#0f0f1e;
  --border:#12121e; --text:#e8e4d9; --muted:#555; --faint:#222;
  --green:#6bda6b; --red:#da6b6b; --amber:#f0a04a; --blue:#4ab0f0;
}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'DM Mono',monospace;font-size:14px;-webkit-font-smoothing:antialiased}
input,select,button{font-family:'DM Mono',monospace}

/* ── LOGO MARK ── */
.logo-mark{display:inline-flex;align-items:center;gap:0;line-height:1;text-decoration:none}
.lm-text{font-family:'Bebas Neue',sans-serif;color:var(--text);letter-spacing:1px;line-height:1}
.lm-para{background:var(--lime);clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);display:inline-flex;align-items:center;justify-content:center;margin:0 3px;flex-shrink:0}
.lm-v{font-family:'Bebas Neue',sans-serif;color:var(--dark);line-height:1}
.logo-sm .lm-text{font-size:22px}.logo-sm .lm-para{padding:0 5px 2px 4px;margin:0 1px}.logo-sm .lm-v{font-size:22px}
.logo-md .lm-text{font-size:32px}.logo-md .lm-para{padding:0 8px 3px 7px;margin:0 2px}.logo-md .lm-v{font-size:32px}
.logo-nav .lm-text{font-size:26px}.logo-nav .lm-para{padding:0 7px 2px 6px;margin:0 2px}.logo-nav .lm-v{font-size:26px}

/* ── LAYOUT ── */
#root{min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--dark);position:sticky;top:0;z-index:100}
.header-right{display:flex;align-items:center;gap:8px}
.logout-btn{width:30px;height:30px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.controls{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--dark)}
.month-sel{background:var(--dark);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:7px 10px;letter-spacing:1px;outline:none;width:100%;transition:border .2s}
.month-sel:focus{border-color:var(--lime)}
.content{flex:1;padding:12px 16px;display:flex;flex-direction:column;gap:10px;max-width:600px;width:100%;margin:0 auto}

/* ── NAV TABS ── */
.nav{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .2s;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%)}
.tab.active{background:var(--lime);color:var(--dark);border-color:var(--lime)}
.tab:hover:not(.active){border-color:var(--lime);color:var(--lime)}

/* ── CARDS ── */
.card{background:var(--mid);border:1px solid var(--border);padding:16px;position:relative}
.card-lime{border-color:#1a3a08;background:#060f06}
.card-blue{border-color:#0f1a2a;background:#060a14}
.card-glow{border-color:#1a3a08;background:linear-gradient(135deg,#060f06 0%,var(--mid) 100%)}

/* ── TYPOGRAPHY ── */
.lbl{font-size:8px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;display:block;margin-bottom:8px}
.hero-num{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--lime);line-height:1}
.hero-num.white{color:var(--text)}
.hero-num.green{color:var(--green)}
.hero-num.red{color:var(--red)}
.sect-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);letter-spacing:1px;margin-bottom:4px}

/* ── INPUTS ── */
.inp{width:100%;background:var(--dark);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:22px;padding:12px;outline:none;transition:border .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--lime)}
.inp.lime{color:var(--lime)}
.sel{width:100%;background:var(--dark);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px;outline:none;transition:border .2s}
.sel:focus{border-color:var(--lime)}
.inp-date{width:100%;background:var(--dark);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:10px;outline:none}
.inp-date:focus{border-color:var(--lime)}

/* ── BUTTONS ── */
.btn-save{width:100%;padding:14px;background:var(--lime);color:var(--dark);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;border:none;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100%-6px) 100%,0% 100%);transition:filter .2s}
.btn-save:hover{filter:brightness(1.1)}
.btn-save.saved{background:var(--green)}
.btn-sm{padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--lime);color:var(--lime)}
.btn-del{width:24px;height:24px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.btn-del:hover{border-color:var(--red);color:var(--red)}

/* ── CALC BOX ── */
.calc-box{background:var(--dark);border:1px solid var(--border);padding:14px;text-align:center;margin-bottom:12px}
.calc-main{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--lime);line-height:1}
.calc-pct{font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:4px}

/* ── DAY ROWS ── */
.dr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.dr:last-child{border-bottom:none}
.dd{font-size:11px;color:var(--muted);width:38px;flex-shrink:0;font-family:'DM Mono',monospace}
.dbw{flex:1;height:4px;background:var(--dark);border-radius:0;overflow:hidden;clip-path:polygon(2px 0%,100% 0%,calc(100%-2px) 100%,0% 100%)}
.db{height:100%;background:var(--lime);border-radius:0;transition:width .4s}
.dv{width:70px;text-align:right;font-size:12px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;flex-shrink:0}
.dp{width:36px;text-align:right;font-size:10px;color:var(--muted);flex-shrink:0}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.stat-box{background:var(--dark);border:1px solid var(--border);padding:12px;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--text)}
.stat-val.lime{color:var(--lime)}
.stat-val.green{color:var(--green)}
.stat-val.red{color:var(--red)}
.stat-lbl{font-size:8px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}
.stat-sub.up{color:var(--green)}.stat-sub.dn{color:var(--red)}

/* ── SUMMARY GRID ── */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.sum-box{background:var(--dark);border:1px solid var(--border);padding:12px}
.sum-label{font-size:8px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.sum-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}

/* ── EARNINGS ── */
.earn-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.earn-row:last-child{border-bottom:none}
.earn-label{font-size:12px;color:var(--text)}
.earn-note{font-size:9px;color:var(--muted);margin-top:2px}
.earn-val{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1}

/* ── PROGRESS BAR ── */
.prog-wrap{padding:10px 0}
.prog-header{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-bar{height:6px;background:var(--dark);clip-path:polygon(2px 0%,100% 0%,calc(100%-2px) 100%,0% 100%);overflow:hidden}
.prog-fill{height:100%;transition:width .5s}

/* ── RANKINGS ── */
.rank-row{margin-bottom:14px}
.rank-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.rank-bar{height:4px;background:var(--dark);clip-path:polygon(2px 0%,100% 0%,calc(100%-2px) 100%,0% 100%);overflow:hidden}
.rank-fill{height:100%}

/* ── VALUE BOXES ── */
.val-box{background:var(--dark);border:1px solid var(--border);padding:14px;text-align:center}
.val-num{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;margin:6px 0}

/* ── ROWS ── */
.ri{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.ri:last-child{border-bottom:none}
.rl{font-size:11px;color:var(--muted)}
.rv{font-family:'Bebas Neue',sans-serif;font-size:16px}
.rv.lime{color:var(--lime)}.rv.green{color:var(--green)}.rv.red{color:var(--red)}

/* ── ROLE BADGES ── */
.rb{font-size:8px;padding:2px 7px;letter-spacing:2px;text-transform:uppercase;clip-path:polygon(3px 0%,100% 0%,calc(100%-3px) 100%,0% 100%)}
.rb-owner{background:var(--lime);color:var(--dark)}
.rb-operator{background:#1a2a08;color:var(--lime);border:1px solid #1a3a08}
.rb-assistant{background:#0f1a2a;color:var(--blue);border:1px solid #0f2a3a}
.rb-trainee{background:#1a0f0f;color:var(--amber);border:1px solid #2a1a0f}

/* ── BAR CHART ── */
.bw{display:flex;align-items:flex-end;gap:4px;height:70px;margin-top:10px}
.bc{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px}
.bf{width:100%;background:var(--border);min-height:4px;clip-path:polygon(2px 0%,100% 0%,calc(100%-2px) 100%,0% 100%);transition:height .4s}
.bd{font-size:7px;color:var(--muted);letter-spacing:1px;white-space:nowrap}

/* ── FILTER BUTTONS ── */
.fb{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;clip-path:polygon(4px 0%,100% 0%,calc(100%-4px) 100%,0% 100%)}
.fb.on{background:var(--lime);color:var(--dark);border-color:var(--lime)}
.fb:hover:not(.on){border-color:var(--lime);color:var(--lime)}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:32px;background:var(--dark);position:relative;overflow:hidden}
.login-wrap::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(180,240,64,0.05) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:8px 0}
.pin-dot{width:12px;height:12px;border:1.5px solid var(--border);background:transparent;clip-path:polygon(3px 0%,100% 0%,calc(100%-3px) 100%,0% 100%);transition:all .2s}
.pin-dot.filled{background:var(--lime);border-color:var(--lime)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:220px}
.pin-btn{padding:18px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:28px;cursor:pointer;transition:all .2s;clip-path:polygon(4px 0%,100% 0%,calc(100%-4px) 100%,0% 100%)}
.pin-btn:hover{border-color:var(--lime);color:var(--lime)}
.pin-btn:active{background:var(--lime);color:var(--dark)}
.login-error{font-size:10px;color:var(--red);letter-spacing:2px;text-transform:uppercase;min-height:18px;text-align:center}
.ts{font-size:10px;color:var(--lime);letter-spacing:1px;padding:8px 0;margin-bottom:8px;border-bottom:1px solid var(--border)}

/* ── MANAGE ── */
.pay-card{border:1px solid var(--border);background:#08080f;padding:14px;margin-bottom:8px}
.pay-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pay-grid{display:grid;gap:6px;margin-bottom:8px}
.pay-cell{background:var(--dark);padding:10px;border:1px solid var(--border)}
.pay-cell-label{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.pay-cell-val{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1}

/* ── TOTALS ── */
.totals-strip{display:grid;gap:2px;margin-bottom:2px}
.total-box{background:var(--mid);border:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.total-label{font-size:9px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.total-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--lime);line-height:1}

/* ── GRID HELPERS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
</style>

const fmtM = n => { if(n>=1000000) return (n/1000000).toFixed(1)+"M"; if(n>=1000) return Math.round(n/1000)+"k"; return fmt(n); };
const fc = (n,c) => (c==="fi" ? "€" : "£") + fmt(n);
const fcM = (n,c) => (c==="fi" ? "€" : "£") + fmtM(n);
const pct = (a,b) => b>0 ? Math.round((a/b)*100) : 0;
const sum = (a,k) => a.reduce((s,e) => s+(Number(e[k])||0), 0);
const bW = (a,id) => a.filter(e => e.workerId===id);
const bM = (a,ym) => a.filter(e => e.date && e.date.startsWith(ym));
const mBonus = (ke,tiers) => { let r=0; tiers.forEach(t => { if(ke>=t.min) r=t.rate; }); return ke*r; };
const rb = (role) => '<span class="rb rb-'+role+'">'+(ROLE_LABELS[role]||role)+'</span>';

// ─── P&L CALCULATOR ──────────────────────────────────────────────────────────
function calcPL(me, month) {
  const f = FD[month] || {};
  const kk=sum(bW(me,"kimmo"),"ke"), sk=sum(bW(me,"shohid"),"ke");
  const hk=sum(bW(me,"hannan"),"ke"), rk=sum(bW(me,"rizwan"),"ke");
  const ak=sum(bW(me,"aki"),"ke"),    jk=sum(bW(me,"julius"),"ke");

  const pd = f.paige  || bW(me,"paige").length;
  const rd = f.rizwan || bW(me,"rizwan").length;
  const md = f.mira   || bW(me,"mira").length;

  const ukComm = (kk+sk+hk+rk)*0.10;
  const fiComm = (ak+jk)*0.10;

  // Income
  const pR=pd*150, rR=rd*150, mR=md*150;

  // Costs
  const sd=bW(me,"shohid").length, hd=bW(me,"hannan").length;
  const sB=sd*140, sBo=mBonus(sk,[{min:100000,rate:0.02}]);
  const hB=hd*100, hBo=mBonus(hk,[{min:100000,rate:0.02},{min:150000,rate:0.035}]);
  const pC=pd*80, rC=rd*100, mC=md*130;
  const aC=ak*0.075, jC=jk*0.05;

  const uI=ukComm+pR+rR+mR, uCo=sB+sBo+hB+hBo+pC+rC+mC;
  const fI=fiComm, fCo=aC+jC;

  return {
    uk: {income:uI, cost:uCo, net:uI-uCo, kK:kk, sK:sk, hK:hk, rK:rk,
         pR, rR, mR, sB, sBo, hB, hBo, pC, rC, mC, sd, hd, pd, rd, md},
    fi: {income:fI, cost:fCo, net:fI-fCo, aK:ak, jK:jk, aC, jC},
    tot: {income:uI+fI, cost:uCo+fCo, net:(uI-uCo)+(fI-fCo)}
  };
}

function pp(v) {
  if(v==='⌫') { pin=pin.slice(0,-1); updateDots(); return; }
  if(pin.length>=6) return;
  pin += v;
  updateDots();

  const matched = USERS.find(x => x.pin===pin);
  if(matched) {
    user=matched; pin=""; view="entry"; fDate=td();
    render();
    return;
  }

  const couldMatch = USERS.some(x => x.pin.startsWith(pin) && x.pin.length > pin.length);
  if(couldMatch) return;

  // No match
  const pe = document.getElementById('pe');
  if(pe) pe.textContent = "Incorrect PIN";
  setTimeout(() => { pin=""; updateDots(); if(pe) pe.textContent=""; }, 1000);
}

function testLogin() {
  user = USERS.find(x => x.workerId==='kimmo');
  view = 'entry';
  fDate = td();

  render();
}

function updateDots() {
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((d,i) => {
    if(i<pin.length) d.classList.add('filled');
    else d.classList.remove('filled');
  });
}

// ─── SAVE ─────────────────────────────────────────────────────────────────────
async function save() {
  const targetId = (user.role==='owner' && fillForWorker) ? fillForWorker : user.workerId;
  const w = WORKERS.find(x => x.id===targetId) || WORKERS.find(x => x.id===user.workerId);
  const entryDate = fDate || td();
  let ke=0, mgn=0, purchases=0, sales=0;
  const a=parseInt(fA)||0, k=parseInt(fK)||0;

  if(w.role==='operator'||w.role==='owner') {
    purchases=parseInt(fP)||0; sales=parseInt(fS)||0;
    if(!purchases&&!sales) return;
    ke=Math.max(0,sales-purchases);
    mgn=sales>0?Math.round((ke/sales)*100):0;
  } else {
    ke=(w.billedRate||0)-(w.dailyRate||0);
    sales=w.billedRate||0;
    mgn=sales>0?Math.round((ke/sales)*100):0;
  }

  const id = entryDate+targetId;
  const entry = {id, date:entryDate, workerId:targetId, ke, purchases, sales, mgn, a, k};
  entries = entries.filter(e=>e.id!==id);
  entries.push(entry);

  await supa.upsert("entries", {id, date:entryDate, workerId:targetId, ke, purchases, sales, mgn, a, k});

  fP=""; fS=""; fA=""; fK=""; fDate=td(); showBackdate=false; fillForWorker="";
  saved=true; render();
  clearTimeout(saveT);
  saveT=setTimeout(() => { saved=false; render(); }, 2500);
}

async function delEntry(id) {
  entries=entries.filter(e=>e.id!==id);
  await supa.del("entries", id);
  render();
}

// ─── LIVE CALC ────────────────────────────────────────────────────────────────
function updateCalc() {
  const p=parseInt(fP)||0, s=parseInt(fS)||0;
  const a=parseInt(fA)||0, k=parseInt(fK)||0;
  const ke=s>p?s-p:0;
  const mgn=s>0?Math.round((ke/s)*100):0;
  const close=a>0?Math.round((k/a)*100):0;

  const box=document.getElementById('calc-box');
  if(box) {
    if(s>0&&p>0) {
      const col=mgn>=35?'#6bda6b':mgn>=22?'#b4f040':'#da6b6b';
      const brd=mgn>=35?'#1a3a1a':mgn>=22?'#2a2a0a':'#2a1a1a';
      box.style.borderColor=brd;
      box.innerHTML=
        '<div class="val-number" style="font-size:40px;color:'+col+'">'+mgn+'%</div>'+
        '<div style="font-size:9px;color:#777;letter-spacing:3px;margin-top:6px">MARGIN</div>'+
        '<div style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:#b4f040;margin-top:8px">'+ke.toLocaleString('en-GB')+' profit</div>';
    } else {
      box.style.borderColor='#0f0f1e';
      box.innerHTML='<div style="font-size:11px;color:#222">Enter purchases & sales</div>';
    }
  }
  const cr=document.getElementById('close-rate');
  if(cr) {
    if(a>0&&k>0&&k<=a) {
      cr.innerHTML='<span style="font-size:13px;color:#6bda6b;font-family:Syne,sans-serif;font-weight:800">'+close+'% close rate</span> <span style="font-size:10px;color:#666">'+k+'/'+a+' deals</span>';
    } else if(k>a&&a>0) {
      cr.innerHTML='<span style="color:#da6b6b;font-size:11px">⚠ Closed cannot exceed customers</span>';
    } else {
      cr.innerHTML='';
    }
  }
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  if(!user) { renderLogin(); return; }

  const w = WORKERS.find(x=>x.id===user.workerId);
  if(!w) { renderLogin(); return; }

  const isOwner = user.role==="owner";
  const me = bM(entries, selMonth);
  const myE = bW(me, user.workerId).sort((a,b)=>a.date.localeCompare(b.date));
  const myKe=sum(myE,"ke"), myDays=myE.length;
  const myA=sum(myE,"a"), myK=sum(myE,"k");
  const myMgns=myE.filter(e=>e.mgn>0);
  const myMgn=myMgns.length>0?Math.round(myMgns.reduce((s,e,_,a)=>s+e.mgn/a.length,0)):0;
  const myConv=myA>0?pct(myK,myA):0;
  const prev=selMonth==="2026-05"?bM(entries,"2026-04"):null;
  const prevKe=prev?sum(bW(prev,user.workerId),"ke"):null;
  const trend=prevKe>0?Math.round(((myKe-prevKe)/prevKe)*100):null;
  const fillTarget=(user.role==="owner"&&fillForWorker)?fillForWorker:user.workerId;
  const todayE=entries.find(e=>e.date===(fDate||td())&&e.workerId===fillTarget);
  const P=calcPL(me,selMonth);
  const allDates=[...new Set(entries.map(e=>e.date))].sort();
  const l14=allDates.slice(-14);
  const maxKe=Math.max(...myE.map(e=>e.ke),1);

  const tabs=isOwner
    ?[["entry","Entry"],["worker","My Stats"],["team","Team"],["totals","Totals"],["value","Value"],["owner","P&L"],["manage","Manage"]]
    :[["entry","Entry"],["worker","My Stats"],["team","Team"],["value","Value"]];

  const nav=tabs.map(([v,l])=>
    "<button class=\"tab"+(view===v?" active":"")+"\" onclick=\"setView(\'"+v+"\')\">"+l+"</button>"
  ).join("");

  let html='<div class="header">';
  html+='<div style="display:flex;align-items:baseline;gap:0;line-height:1">'+
    '<div class="logo-mark logo-nav">'+
      '<span class="lm-text">de</span>'+
      '<div class="lm-para" style="padding:0 7px 2px 6px"><span class="lm-v" style="font-size:26px">V</span></div>'+
      '<span class="lm-text">alor</span>'+
    '</div>'+
    '<div style="display:flex;flex-direction:column;margin-left:8px;justify-content:center">'+
      '<span style="font-family:DM Mono,monospace;font-size:8px;color:var(--lime);letter-spacing:3px;text-transform:uppercase;line-height:1">TRACK <sup style=\"font-size:6px\">™</sup></span>'+
    '</div>'+
  '</div>';
  html+='<div class="header-right">';
  html+='<div class="nav">'+nav+'</div>';
  html+='<button class="logout-btn" onclick="logout()">⏻</button>';
  html+='</div></div>';
  html+='<div class="controls">';
  html+='<select class="month-sel" onchange="setMonth(this.value)">';
  MONTHS.forEach(m=>{html+='<option value="'+m+'"'+(m===selMonth?' selected':'')+'>'+MO_LABEL[m]+'</option>';});
  html+='</select></div>';
  html+='<div class="content">';

  // ── ENTRY ──────────────────────────────────────────────────────────────────
  if(view==="entry"){
    const entryDate=fDate||td();
    const isAssistant=w.role==="assistant"||w.role==="trainee";
    const billingProfit=isAssistant?(w.billedRate||0)-(w.dailyRate||0):0;

    html+="<div class=\"card\">";
    html+="<span class=\"lbl\">Operator</span>";
    html+="<div style=\"font-family:Syne,sans-serif;font-size:15px;font-weight:800\">"+w.name+" "+rb(w.role)+"</div>";
    html+="</div>";

    if(isOwner){
      html+="<div class=\"card\" style=\"border-color:#1a2a3a\">";
      html+="<span class=\"lbl\">Fill for team member</span>";
      html+="<select class=\"sel\" onchange=\"fillForWorker=this.value;render()\">";
      html+="<option value=\"\">— My own entry —</option>";
      WORKERS.filter(wk=>wk.id!==user.workerId).forEach(wk=>{
        html+="<option value=\""+wk.id+"\""+( fillForWorker===wk.id?" selected":"")+">"+wk.name+" "+ROLE_LABELS[wk.role]+"</option>";
      });
      html+="</select></div>";
    }

    html+="<div class=\"card\">";
    html+="<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px\">";
    html+="<div style=\"font-family:Syne,sans-serif;font-size:14px;font-weight:800\">Daily Entry</div>";
    html+="<button class=\"btn-sm\" onclick=\"toggleBackdate()\">"+(showBackdate?"▲ Today":"▼ Past day")+"</button></div>";

    if(showBackdate){
      html+="<div style=\"margin-bottom:14px\">";
      html+="<span class=\"lbl\">Date</span>";
      html+="<input type=\"date\" class=\"inp-date\" value=\""+entryDate+"\" onchange=\"fDate=this.value;render()\" id=\"idate\">";
      if(entryDate!==td()) html+="<div style=\"font-size:10px;color:#f0a04a;margin-top:6px\">⚠ Adding entry for "+entryDate+"</div>";
      html+="</div>";
    } else {
      html+="<div style=\"font-size:10px;color:#666;margin-bottom:14px;letter-spacing:1px\">"+td()+"</div>";
    }

    if(todayE){
      html+="<div class=\"ts\">Saved for "+entryDate+": ";
      html+="<span style=\"color:#b4f040;font-weight:700\">"+fc(todayE.ke,w.country||"uk");
      if(todayE.mgn>0) html+=" · "+todayE.mgn+"%";
      if(todayE.a>0) html+=" · "+todayE.a+"/"+todayE.k;
      html+="</span> <button class=\"btn-del\" onclick=\"delEntry(\'"+todayE.id+"\')\">✕ delete</button></div>";
    }

    if(isAssistant){
      html+="<div style=\"background:#06060f;border:1px solid #0f1f0f;border-radius:4px;padding:20px;text-align:center;margin-bottom:14px\">";
      html+="<div style=\"font-size:9px;color:#777;letter-spacing:3px;margin-bottom:12px\">DAILY BILLING SUMMARY</div>";
      html+="<div class=\"g2\" style=\"margin-bottom:16px\">";
      html+="<div><div style=\"font-size:9px;color:#777;letter-spacing:2px\">BILLED TO CLIENT</div>";
      html+="<div style=\"font-family:Syne,sans-serif;font-size:28px;font-weight:900;color:#b4f040\">£"+fmt(w.billedRate||0)+"</div></div>";
      html+="<div><div style=\"font-size:9px;color:#777;letter-spacing:2px\">YOUR PAY</div>";
      html+="<div style=\"font-family:Syne,sans-serif;font-size:28px;font-weight:900\">£"+fmt(w.dailyRate||0)+"</div></div></div>";
      html+="<div style=\"border-top:1px solid #0f0f1e;padding-top:14px\">";
      html+="<div style=\"font-size:9px;color:#777;letter-spacing:2px\">DEVALOR PROFIT</div>";
      html+="<div style=\"font-family:Syne,sans-serif;font-size:36px;font-weight:900;color:#6bda6b\">£"+fmt(billingProfit)+"</div></div></div>";
      html+="<button class=\"btn-save"+(saved?" saved":"")+"\"\ onclick=\"save()\">"+( saved?"✓ SAVED":"SAVE DAY — "+entryDate)+"</button>";
    } else {
      html+="<div class=\"g2\" style=\"margin-bottom:12px\">";
      html+="<div><span class=\"lbl\" style=\"text-align:center;display:block\">Purchases</span>";
      html+="<input type=\"number\" class=\"inp\" placeholder=\"0\" value=\""+fP+"\" oninput=\"fP=this.value;updateCalc()\" id=\"ip\"></div>";
      html+="<div><span class=\"lbl\" style=\"text-align:center;display:block\">Sales</span>";
      html+="<input type=\"number\" class=\"inp ac\" placeholder=\"0\" value=\""+fS+"\" oninput=\"fS=this.value;updateCalc()\" id=\"is\"></div></div>";
      html+="<div class=\"calc-box\" id=\"calc-box\"><div style=\"font-size:11px;color:#222\">Enter purchases & sales</div></div>";
      html+="<div class=\"g2\" style=\"margin-bottom:12px\">";
      html+="<div><span class=\"lbl\" style=\"text-align:center;display:block\">Customers</span>";
      html+="<input type=\"number\" class=\"inp\" placeholder=\"0\" value=\""+fA+"\" oninput=\"fA=this.value;updateCalc()\" id=\"ia\"></div>";
      html+="<div><span class=\"lbl\" style=\"text-align:center;display:block\">Closed</span>";
      html+="<input type=\"number\" class=\"inp\" placeholder=\"0\" value=\""+fK+"\" oninput=\"fK=this.value;updateCalc()\" id=\"ik\"></div></div>";
      html+="<div id=\"close-rate\" style=\"text-align:center;min-height:20px;margin-bottom:10px\"></div>";
      html+="<button class=\"btn-save"+(saved?" saved":"")+"\"\ onclick=\"save()\">"+(saved?"✓ SAVED":"SAVE DAY")+"</button>";
    }
    html+="</div>";
  }

  // ── MY STATS ───────────────────────────────────────────────────────────────
  if(view==="worker"){
    const myKpd=myDays>0?myKe/myDays:0;
    const myTurnover=sum(myE,"sales");
    const myIncome=w.role==="assistant"||w.role==="trainee"
      ?myDays*(w.dailyRate||0)
      :w.dailyRate>0?myDays*w.dailyRate+mBonus(myKe,w.bonusTiers||[])
      :w.rate>0?myKe*(1-w.rate):0;
    const prevMyE=prev?bW(prev,user.workerId):[];
    const prevMyKe=sum(prevMyE,"ke");
    const prevDays=prevMyE.length;
    const prevIncome=prev&&w.dailyRate>0?prevDays*w.dailyRate+mBonus(prevMyKe,w.bonusTiers||[]):0;
    const incomeTrend=prevIncome>0?Math.round(((myIncome-prevIncome)/prevIncome)*100):null;

    html+="<div class=\"card card-glow\">";
    html+="<span class=\"lbl\">"+MO_LABEL[selMonth]+"</span>";
    html+="<div class=\"stat-grid\">";
    html+="<div><div class=\"stat-val ac\">"+fc(myKe,w.country)+"</div><div class=\"stat-lbl\">Margin</div>";
    if(trend!==null) html+="<div class=\"stat-sub "+(trend>=0?"up":"dn")+"\">"+(trend>=0?"↑":"↓")+Math.abs(trend)+"% vs prev</div>";
    html+="</div>";
    html+="<div><div class=\"stat-val "+(myMgn>=35?"up":myMgn>=22?"ac":"mu")+"\">"+( myMgn>0?myMgn+"%":"—")+"</div><div class=\"stat-lbl\">Margin %</div><div class=\"stat-sub mu\">"+myDays+" days</div></div>";
    html+="<div><div class=\"stat-val\">"+(myConv>0?myConv+"%":"—")+"</div><div class=\"stat-lbl\">Close %</div><div class=\"stat-sub mu\">"+myK+"/"+myA+"</div></div>";
    html+="</div>";

    // ── EARNINGS CARD ──
    if(w.dailyRate>0||(w.role==="assistant"||w.role==="trainee")){
      const basePay=myDays*(w.dailyRate||0);
      const curBonus=mBonus(myKe,w.bonusTiers||[]);
      const totalPay=basePay+curBonus;
      const cur=w.country==="fi"?"€":"£";

      html+="<div style=\"background:#0a180a;border:1px solid #1a3a1a;border-radius:4px;padding:16px;margin-top:10px\">";
      html+="<div style=\"font-size:9px;color:#888;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px\">My Earnings — "+MO_LABEL[selMonth]+"</div>";

      // Base pay
      html+="<div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2a1a\">";
      html+="<div><div style=\"font-size:13px;color:#e8e4d9\">Base pay</div>";
      html+="<div style=\"font-size:10px;color:#777;margin-top:2px\">"+myDays+" days × "+cur+(w.dailyRate||0)+"/day</div></div>";
      html+="<div style=\"font-family:Syne,sans-serif;font-size:20px;font-weight:800;color:#e8e4d9\">"+cur+fmt(basePay)+"</div></div>";

      // Bonus
      if(w.bonusTiers&&w.bonusTiers.length>0){
        const nextTier=w.bonusTiers.find(t=>myKe<t.min);
        if(curBonus>0){
          html+="<div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2a1a\">";
          html+="<div><div style=\"font-size:13px;color:#6bda6b\">🎯 Bonus</div>";
          const earnedTier=w.bonusTiers.filter(t=>myKe>=t.min).pop();
          html+="<div style=\"font-size:10px;color:#777;margin-top:2px\">"+(earnedTier?(earnedTier.rate*100)+"% of margin":"")+"</div></div>";
          html+="<div style=\"font-family:Syne,sans-serif;font-size:20px;font-weight:800;color:#6bda6b\">+"+cur+fmt(curBonus)+"</div></div>";
        } else if(nextTier){
          html+="<div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2a1a\">";
          html+="<div><div style=\"font-size:13px;color:#666\">Bonus</div>";
          html+="<div style=\"font-size:10px;color:#777;margin-top:2px\">Starts at "+cur+fmt(nextTier.min)+" margin</div></div>";
          html+="<div style=\"font-family:Syne,sans-serif;font-size:20px;font-weight:800;color:#555\">—</div></div>";
        }
        // Progress bar
        if(nextTier){
          const pct=Math.min(100,Math.round((myKe/nextTier.min)*100));
          const needed=nextTier.min-myKe;
          const barCol=pct>=80?"#6bda6b":pct>=50?"#b4f040":"#f0a04a";
          html+="<div style=\"padding:10px 0;border-bottom:1px solid #1a2a1a\">";
          html+="<div style=\"display:flex;justify-content:space-between;margin-bottom:6px\">";
          html+="<div style=\"font-size:10px;color:#888\">Bonus progress</div>";
          html+="<div style=\"font-size:10px;color:"+barCol+";font-weight:700\">"+cur+fmt(needed)+" to go ("+pct+"%)</div></div>";
          html+="<div style=\"height:8px;background:#0f0f1e;border-radius:4px;overflow:hidden\">";
          html+="<div style=\"height:100%;width:"+pct+"%;background:"+barCol+";border-radius:4px\"></div></div></div>";
        }
      }

      // Total
      html+="<div style=\"display:flex;justify-content:space-between;align-items:center;padding:10px 0 0\">";
      html+="<div style=\"font-size:13px;font-weight:700;color:#e8e4d9\">Total this month</div>";
      html+="<div style=\"font-family:Syne,sans-serif;font-size:26px;font-weight:900;color:#6bda6b\">"+cur+fmt(totalPay)+"</div></div>";

      if(incomeTrend!==null){
        html+="<div style=\"text-align:right;margin-top:4px;font-size:10px;color:"+(incomeTrend>=0?"#6bda6b":"#da6b6b")+"\">";
        html+=(incomeTrend>=0?"↑":"↓")+Math.abs(incomeTrend)+"% vs last month</div>";
      }
      html+="</div>";
    }
    html+="</div>";

    // Monthly summary
    html+="<div class=\"card\" style=\"margin-top:10px;background:linear-gradient(135deg,#0a0a18 0%,#0d0d1f 100%);border-color:#1a1a3a\">";
    html+="<span class=\"lbl\">Monthly Summary</span>";
    html+="<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px\">";
    html+="<div style=\"background:#06060f;border:1px solid #0f0f1e;border-radius:3px;padding:12px\"><div style=\"font-size:9px;color:#777;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px\">Turnover</div><div style=\"font-family:Syne,sans-serif;font-size:20px;font-weight:900;color:#e8e4d9\">"+fc(myTurnover,w.country)+"</div></div>";
    html+="<div style=\"background:#06060f;border:1px solid #1a2a1a;border-radius:3px;padding:12px\"><div style=\"font-size:9px;color:#777;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px\">Margin</div><div style=\"font-family:Syne,sans-serif;font-size:20px;font-weight:900;color:#b4f040\">"+fc(myKe,w.country)+"</div></div>";
    html+="<div style=\"background:#06060f;border:1px solid #0f0f1e;border-radius:3px;padding:12px\"><div style=\"font-size:9px;color:#777;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px\">Margin %</div><div style=\"font-family:Syne,sans-serif;font-size:20px;font-weight:900;color:"+(myMgn>=35?"#6bda6b":myMgn>=22?"#b4f040":"#da6b6b")+"\">"+(myMgn>0?myMgn+"%":"—")+"</div></div>";
    html+="<div style=\"background:#06060f;border:1px solid #0f0f1e;border-radius:3px;padding:12px\"><div style=\"font-size:9px;color:#777;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px\">Days</div><div style=\"font-family:Syne,sans-serif;font-size:20px;font-weight:900\">"+myDays+"</div></div>";
    html+="</div></div>";

    // Day-by-day calendar
    html+="<div class=\"card\" style=\"margin-top:10px\">";
    html+="<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px\"><span class=\"lbl\" style=\"margin-bottom:0\">Day-by-Day</span><span style=\"font-size:10px;color:#666\">"+myDays+" logged</span></div>";
    const yr1=parseInt(selMonth.slice(0,4)), mo1=parseInt(selMonth.slice(5,7));
    const dim=new Date(yr1,mo1,0).getDate();
    const tod=td();
    const eMap={};
    myE.forEach(e=>{eMap[e.date]=e;});
    for(let d=1;d<=dim;d++){
      const ds=selMonth+"-"+(d<10?"0":"")+d;
      const e=eMap[ds];
      const isT=ds===tod, isF=ds>tod;
      if(isF){
        html+="<div class=\"dr\" style=\"opacity:0.2\"><div class=\"dd\">"+ds.slice(5)+"</div><div class=\"dbw\"></div><div class=\"dv\" style=\"font-size:10px;color:#222\">—</div><div class=\"dp\"></div><div style=\"width:28px\"></div></div>";
      } else if(e){
        const bw=Math.round((e.ke/Math.max(maxKe,1))*100);
        const sp=e.mgn>0?e.mgn+"%":(e.a>0?pct(e.k,e.a)+"%":"");
        html+="<div class=\"dr\"><div class=\"dd\" style=\""+(isT?"color:#b4f040;font-weight:700":"")+"\">"+ ds.slice(5)+"</div><div class=\"dbw\"><div class=\"db\" style=\"width:"+bw+"%\"></div></div><div class=\"dv\">"+fc(e.ke,w.country)+"</div><div class=\"dp\">"+sp+"</div><button class=\"btn-del\" data-id=\""+e.id+"\" onclick=\"delEntry(this.dataset.id)\">✕</button></div>";
      } else {
        html+="<div class=\"dr\" style=\"opacity:0.38\"><div class=\"dd\" style=\"color:#666\">"+ds.slice(5)+"</div><div class=\"dbw\"><div style=\"height:2px;background:#111;width:100%;border-radius:2px\"></div></div><div class=\"dv\" style=\"font-size:10px;color:#222\">—</div><div class=\"dp\"></div><button class=\"btn-sm\" style=\"padding:2px 8px;font-size:9px;\" data-date=\""+ds+"\" onclick=\"addMissingDay(this.dataset.date)\">+</button></div>";
      }
    }
    html+="</div>";
  }

  // ── TEAM ───────────────────────────────────────────────────────────────────
  if(view==="team"){
    const myCountry=w.country||"uk";
    const team=WORKERS.filter(wk=>wk.country===myCountry&&wk.id!==user.workerId);
    html+="<div class=\"card\" style=\"background:linear-gradient(135deg,#080f1a 0%,#0d0d1f 100%);border-color:#0f1a2a\">";
    html+="<span class=\"lbl\">"+(myCountry==="uk"?"🇬🇧 UK":"🇫🇮 Finland")+" Team — "+MO_LABEL[selMonth]+"</span></div>";
    team.forEach(tm=>{
      const tmE=bW(me,tm.id).sort((a,b)=>a.date.localeCompare(b.date));
      const tmKe=sum(tmE,"ke"), tmDays=tmE.length;
      const maxTm=Math.max(...tmE.map(e=>e.ke),1);
      html+="<div class=\"card\">";
      html+="<div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px\">";
      html+="<div><div style=\"font-family:Syne,sans-serif;font-size:14px;font-weight:800\">"+tm.name+" "+rb(tm.role)+"</div>";
      html+="<div style=\"font-size:10px;color:#666;margin-top:3px\">"+tm.car+"</div></div>";
      html+="<div style=\"text-align:right\"><div style=\"font-family:Syne,sans-serif;font-size:18px;font-weight:900;color:#b4f040\">"+fc(tmKe,tm.country)+"</div>";
      html+="<div style=\"font-size:10px;color:#666\">"+tmDays+" days</div></div></div>";
      if(isOwner&&(tm.role==="assistant"||tm.role==="trainee")){
        const bl=tmDays*(tm.billedRate||0), pd=tmDays*(tm.dailyRate||0);
        html+="<div class=\"g3\" style=\"margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #0f0f1e\">";
        html+="<div><div style=\"font-size:9px;color:#666\">Billed</div><div style=\"font-family:Syne,sans-serif;font-size:15px;font-weight:800;color:#b4f040\">£"+fmt(bl)+"</div></div>";
        html+="<div><div style=\"font-size:9px;color:#666\">Paid</div><div style=\"font-family:Syne,sans-serif;font-size:15px;font-weight:800\">£"+fmt(pd)+"</div></div>";
        html+="<div><div style=\"font-size:9px;color:#666\">Profit</div><div style=\"font-family:Syne,sans-serif;font-size:15px;font-weight:800;color:#6bda6b\">£"+fmt(bl-pd)+"</div></div></div>";
      }
      if(tmE.length>0){
        tmE.forEach(e=>{
          const bw=Math.round((e.ke/maxTm)*100);
          html+="<div class=\"dr\"><div class=\"dd\">"+e.date.slice(5)+"</div><div class=\"dbw\"><div class=\"db\" style=\"width:"+bw+"%\"></div></div><div class=\"dv\">"+fc(e.ke,tm.country)+"</div><div class=\"dp\">"+(e.mgn>0?e.mgn+"%":"")+"</div></div>";
        });
      } else {
        html+="<div style=\"font-size:11px;color:#1a1a1a;padding:8px 0\">No entries this month</div>";
      }
      html+="</div>";
    });
  }

  // ── TOTALS ─────────────────────────────────────────────────────────────────
  if(view==="totals"){
    // All operators total
    const allMe = bM(entries, selMonth);
    const ukOps = WORKERS.filter(wk=>wk.country==="uk");
    const fiOps = WORKERS.filter(wk=>wk.country==="fi");

    // Per-operator totals
    const opTotals = WORKERS.map(wk=>{
      const wkE = bW(allMe, wk.id);
      const wkKe = sum(wkE,"ke");
      const wkDays = wkE.length;
      const wkSales = sum(wkE,"sales");
      return {wk, ke:wkKe, days:wkDays, sales:wkSales};

      const wkDays=wkMe.length;
      const wkKe=sum(wkMe,"ke");
      const basePay=wkDays*(wk.dailyRate||0);
      const bonus=mBonus(wkKe,wk.bonusTiers||[]);
      const totalPay=basePay+bonus;
      const billed=wkDays*(wk.billedRate||0);
      const profit=billed-totalPay;
      const cur=wk.country==="fi"?"€":"£";
      const isAssist=wk.role==="assistant"||wk.role==="trainee";

      html+="<div style=\"border:1px solid #1a1a2a;border-radius:3px;padding:12px;margin-bottom:8px;background:#080810\">";

      // Header row
      html+="<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">";
      html+="<div><div style=\"font-family:Syne,sans-serif;font-size:14px;font-weight:800\">"+country+" "+wk.name+" "+rb(wk.role)+"</div>";
      html+="<div style=\"font-size:10px;color:#777;margin-top:2px\">"+wkDays+" days worked</div></div>";
      html+="<div style=\"text-align:right\">";
      html+="<div style=\"font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:"+(totalPay>0?"#e8e4d9":"#555")+"\">"+(totalPay>0?cur+fmt(totalPay):"—")+"</div>";
      html+="<div style=\"font-size:9px;color:#777\">total pay</div></div></div>";

      if(wkDays>0){
        // Pay breakdown
        html+="<div style=\"display:grid;grid-template-columns:1fr 1fr"+(isAssist?" 1fr":"");
        html+=(isAssist||bonus>0?" 1fr":"");
        html+=";gap:8px\">";

        // Days × rate
        html+="<div style=\"background:#06060f;border-radius:2px;padding:8px\">";
        html+="<div style=\"font-size:9px;color:#777\">Days × rate</div>";
        html+="<div style=\"font-family:Syne,sans-serif;font-size:14px;font-weight:700;margin-top:2px\">";
        html+=wkDays+" × "+cur+(wk.dailyRate||0)+"</div></div>";

        // Base pay
        html+="<div style=\"background:#06060f;border-radius:2px;padding:8px\">";
        html+="<div style=\"font-size:9px;color:#777\">Base pay</div>";
        html+="<div style=\"font-family:Syne,sans-serif;font-size:14px;font-weight:700;color:#e8e4d9;margin-top:2px\">"+cur+fmt(basePay)+"</div></div>";

        // Bonus (if any)
        if(bonus>0){
          html+="<div style=\"background:#060f06;border:1px solid #1a3a1a;border-radius:2px;padding:8px\">";
          html+="<div style=\"font-size:9px;color:#6bda6b\">Bonus</div>";
          html+="<div style=\"font-family:Syne,sans-serif;font-size:14px;font-weight:700;color:#6bda6b;margin-top:2px\">+"+cur+fmt(bonus)+"</div></div>";
        }

        // Billed / profit for assistants
        if(isAssist&&wk.billedRate>0){
          html+="<div style=\"background:#06060f;border-radius:2px;padding:8px\">";
          html+="<div style=\"font-size:9px;color:#777\">Billed</div>";
          html+="<div style=\"font-family:Syne,sans-serif;font-size:14px;font-weight:700;color:#b4f040;margin-top:2px\">"+cur+fmt(billed)+"</div></div>";
        }

        html+="</div>";

        // Devalor profit for assistants
        if(isAssist&&billed>0){
          html+="<div style=\"display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #1a1a2a\">";
          html+="<div style=\"font-size:11px;color:#777\">Devalor profit</div>";
          html+="<div style=\"font-family:Syne,sans-serif;font-size:13px;font-weight:800;color:"+(profit>=0?"#6bda6b":"#da6b6b")+"\">"+(profit>=0?"+":"")+cur+fmt(profit)+"</div></div>";
        }
      } else {
        html+="<div style=\"font-size:11px;color:#555;padding:4px 0\">No entries this month</div>";
      }

      html+="</div>";
    });
    html+="</div>";
  }

  html+="</div>";
  document.getElementById("root").innerHTML=html;
} // end render

// ─── HELPER FUNCTIONS ───────────────────────────────────────────────────────
function addMissingDay(date) {
  fDate = date;
  showBackdate = true;
  setView('entry');
}

// ─── MANAGE STATE ─────────────────────────────────────────────────────────────
let mState = {name:'',role:'operator',country:'uk',pin:'',dailyRate:0,billedRate:0,earlyAdopter:false};

async function addMember() {
  const status = document.getElementById('m-status');
  const setStatus = (msg, col) => { if(status) status.innerHTML='<span style="color:'+col+'">'+msg+'</span>'; };

  if(!mState.name.trim()) { setStatus('⚠ Name is required','#da6b6b'); return; }
  if(!mState.pin || mState.pin.length < 4) { setStatus('⚠ PIN must be 4 digits','#da6b6b'); return; }
  if(USERS.find(u => u.pin === mState.pin)) { setStatus('⚠ PIN already in use — choose another','#da6b6b'); return; }

  setStatus('Saving...','#b4f040');

  const id = mState.name.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,10) + Date.now().toString().slice(-4);

  // Save to Supabase
  const ok1 = await supa.upsert("operators", {
    id, name:mState.name, country:mState.country, role:mState.role,
    billed_rate: mState.billedRate||0,
    daily_rate: mState.dailyRate||0,
    commission_rate: 0, bonus_tiers: [],
    active: true, early_adopter: mState.earlyAdopter,
    joined_date: new Date().toISOString().slice(0,10)
  });
  const ok2 = await supa.upsert("users", {
    id: id+'-u', operator_id: id, pin: mState.pin, role: 'worker'
  });

  if(ok1 && ok2) {
    // Add to local state immediately
    WORKERS.push({
      id, name:mState.name, country:mState.country, car:'',
      role:mState.role, billedRate:mState.billedRate||0,
      dailyRate:mState.dailyRate||0, rate:0, bonusTiers:[],
      earlyAdopter:mState.earlyAdopter
    });
    USERS.push({pin:mState.pin, workerId:id, role:'worker'});
    setStatus('✓ '+mState.name+' added! PIN: '+mState.pin,'#6bda6b');
    mState = {name:'',role:'operator',country:'uk',pin:'',dailyRate:0,billedRate:0,earlyAdopter:false};
    setTimeout(()=>render(), 2000);
  } else {
    // Still add locally even if Supabase fails
    WORKERS.push({
      id, name:mState.name, country:mState.country, car:'',
      role:mState.role, billedRate:mState.billedRate||0,
      dailyRate:mState.dailyRate||0, rate:0, bonusTiers:[],
      earlyAdopter:mState.earlyAdopter
    });
    USERS.push({pin:mState.pin, workerId:id, role:'worker'});
    setStatus('✓ Added locally (Supabase sync failed)','#f0a04a');
    mState = {name:'',role:'operator',country:'uk',pin:'',dailyRate:0,billedRate:0,earlyAdopter:false};
    setTimeout(()=>render(), 2000);
  }
}
